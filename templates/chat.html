
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>PLA Assistant · Northeastern CPS</title>
  <link rel="stylesheet" href="/static/chat.css" />
</head>
<body>

  <div id="header">
    PLA Assistant <span> Northeastern University</span>
  </div>

  <div id="messages">
    <div id="typing">Thinking…</div>
  </div>

  <div id="input-bar">
     <label id="upload-btn" title="Attach a file" style="display:none">
      📎
      <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg" />
    </label>
    <textarea id="msg" placeholder="Type your message…" rows="1"></textarea>
    <button id="send">Send</button>
  </div>

<script> 
  //reaches into HTML and references to the elements that are interactive
  const msgsEl   = document.getElementById('messages'); //chat bubbles
  const typingEl = document.getElementById('typing'); 
  const msgEl    = document.getElementById('msg'); //message
  const sendEl   = document.getElementById('send');

  const conversationHistory = [];//setting up memory
  let busy = false; //checking if the app is currently waiting for a response

  msgEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });//send if hit enter 

  sendEl.addEventListener('click', handleSend);//send if the send button is hit

  //main send function 
  async function handleSend() {
    const text = msgEl.value.trim();
    if (!text || busy) return;
    addMsg('user', text);
    msgEl.value = '';
    setBusy(true);
    //calling the backend by talking to Flask
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: conversationHistory }),
      });
      const data = await res.json();
      const answer = res.ok ? (data.answer || '') : (data.error || 'Request failed');
      //memory updates and displays the responses
      conversationHistory.push({ role: 'user', content: text });
      conversationHistory.push({ role: 'assistant', content: answer });
      addMsg('bot', answer);
      checkForUploadTrigger(answer);
    } catch (e) {
      addMsg('bot', 'Network error — please try again.');
    }
    setBusy(false);
    msgEl.focus();
  }
//interact with the div in css for the "thinking" while the response comes
  function addMsg(role, text) {
    typingEl.style.display = 'none';
    const d = document.createElement('div');
    d.className = role === 'bot' ? 'msg-bot' : 'msg-user';
    d.textContent = text;
    msgsEl.insertBefore(d, typingEl);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
//locking and unlocking the UI depending on the user can type again
 function setBusy(v) {
    busy = v;
    sendEl.disabled = v;
    msgEl.disabled  = v;
    document.getElementById('file-input').disabled = v;
    typingEl.style.display = v ? 'block' : 'none';
    if (v) msgsEl.scrollTop = msgsEl.scrollHeight;
  }
 
//file upload handler
  document.getElementById('file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    addMsg('user', `📎 ${file.name}`);
    setBusy(true);

    const formData = new FormData();
    formData.append('file', file);
    formData.append('history', JSON.stringify(conversationHistory));
    formData.append('label', file.name);

    try {
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      const data = await res.json();
      const answer = res.ok ? (data.answer || '') : (data.error || 'Upload failed');

      conversationHistory.push({ role: 'user', content: `[Uploaded file: ${file.name}]` });
      conversationHistory.push({ role: 'assistant', content: answer });
      addMsg('bot', answer);
    } catch {
      addMsg('bot', 'Network error — could not upload file.');
    }

    setBusy(false);
    e.target.value = '';
  }); 

  const UPLOAD_TRIGGERS = [
    'transcript', 'resume', 'résumé', 'syllabus', 'syllabi',
    'certification', 'certificate', 'badge', 'hr statement',
    'hr letter', 'work sample', 'portfolio', 'upload', 'attach',
    'submit', 'provide your', 'do you have your'
  ];

  function checkForUploadTrigger(botText) {
    const lower = botText.toLowerCase();
    const shouldShow = UPLOAD_TRIGGERS.some(word => lower.includes(word));
    document.getElementById('upload-btn').style.display = shouldShow ? 'flex' : 'none';
  }

  document.addEventListener('DOMContentLoaded', () => {
  addMsg('bot', 'Hello! Welcome to the Northeastern CPS Prior Learning Assessment assistant. To get started, please enter your NUID (your 9-digit Northeastern University ID number).');
});
</body>
</html>
