<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPL Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f5f5f5;
    }

    /* Header */
    #header {
      background: #1C1C1C;
      color: white;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Bot message */
    .msg-bot {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px 16px;
      max-width: 70%;
      align-self: flex-start;
      font-size: 14px;
      line-height: 1.6;
    }

    /* User message */
    .msg-user {
      background: #1C1C1C;
      color: white;
      border-radius: 12px;
      padding: 12px 16px;
      max-width: 70%;
      align-self: flex-end;
      font-size: 14px;
      line-height: 1.6;
    }

    /* Typing indicator */
    #typing {
      display: none;
      align-self: flex-start;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      color: #888;
    }

    /* Input bar */
    #input-bar {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid #ddd;
      background: white;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      outline: none;
      resize: none;
      height: 42px;
    }

    #chat-input:focus { border-color: #888; }

    #send-btn {
      padding: 10px 20px;
      background: #1C1C1C;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    #send-btn:hover { background: #333; }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>

  <div id="header">PLA Assistant · Northeastern CPS</div>

  <div id="messages">
    <!-- messages render here -->
    <div id="typing">Thinking…</div>
  </div>

  <div id="input-bar">
    <textarea id="chat-input" placeholder="Type your message…" rows="1"></textarea>
    <button id="send-btn" onclick="handleSend()">Send</button>
  </div>

<script>
  const msgsEl  = document.getElementById('messages');
  const inputEl = document.getElementById('chat-input');
  const sendEl  = document.getElementById('send-btn');
  const typingEl = document.getElementById('typing');

  let busy = false;
  const conversationHistory = [];

  /* ── Call backend ── */
  async function callAPI(message) {
    const res  = await fetch('/api/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message, history: conversationHistory }),
    });
    const raw  = await res.text();
    let data   = null;
    try { data = JSON.parse(raw); } catch (_) {}
    if (!res.ok) throw new Error(data?.error ?? `Error ${res.status}`);
    return data?.answer ?? raw;
  }

  /* ── Send ── */
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || busy) return;
    addUserMsg(text);
    inputEl.value = '';
    setBusy(true);
    try {
      const answer = await callAPI(text);
      conversationHistory.push({ role: 'user', content: text });
      conversationHistory.push({ role: 'assistant', content: answer });
      addBotMsg(answer);
    } catch (err) {
      addBotMsg('Error: ' + err.message);
    }
    setBusy(false);
    inputEl.focus();
  }

  /* ── Render ── */
  function addBotMsg(html) {
    typingEl.style.display = 'none';
    const d = document.createElement('div');
    d.className = 'msg-bot';
    d.innerHTML = html;
    msgsEl.insertBefore(d, typingEl);
    scrollBottom();
  }

  function addUserMsg(text) {
    const d = document.createElement('div');
    d.className = 'msg-user';
    d.textContent = text;
    msgsEl.insertBefore(d, typingEl);
    scrollBottom();
  }

  /* ── State ── */
  function setBusy(v) {
    busy = v;
    sendEl.disabled  = v;
    inputEl.disabled = v;
    typingEl.style.display = v ? 'block' : 'none';
  }

  /* ── Keyboard ── */
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  function scrollBottom() {
    requestAnimationFrame(() => { msgsEl.scrollTop = msgsEl.scrollHeight; });
  }

  /* ── Boot: send init to backend to get opening message ── */
  setBusy(true);
  callAPI('__init__')
    .then(answer  => addBotMsg(answer))
    .catch(_      => addBotMsg('Welcome! What is your full name?'))
    .finally(()   => { setBusy(false); inputEl.focus(); });

</script>
</body>
</html>
